name: Docker Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: vrboyzero/star-sanctuary

jobs:
  # ========================================
  # Job 1: 构建和测试
  # ========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./package.json').version || '0.0.0-dev'")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vrboyzero/star-sanctuary:test
          build-args: |
            BELLDANDY_VERSION=${{ steps.build_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # 启动容器（使用 mock agent，无需 API key）
          docker run -d \
            --name star-sanctuary-test \
            -e BELLDANDY_HOST=0.0.0.0 \
            -e BELLDANDY_PORT=28889 \
            -e BELLDANDY_AUTH_MODE=token \
            -e BELLDANDY_AUTH_TOKEN=ci-test-token-12345 \
            -e BELLDANDY_AGENT_PROVIDER=mock \
            -e BELLDANDY_TOOLS_ENABLED=false \
            -p 28889:28889 \
            vrboyzero/star-sanctuary:test

          # 等待健康检查通过（最多 60 秒）
          echo "Waiting for health check..."
          for i in {1..30}; do
            if docker exec star-sanctuary-test node -e "require('http').get('http://127.0.0.1:28889/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" 2>/dev/null; then
              echo "✅ Health check passed"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Health check failed after 60s"
              docker logs star-sanctuary-test
              exit 1
            fi
            sleep 2
          done

          # 测试 WebChat 静态文件
          echo "Testing WebChat static files..."
          curl -f http://localhost:28889/ || (echo "❌ WebChat index.html not found" && exit 1)
          echo "✅ WebChat accessible"

          # 清理
          docker stop star-sanctuary-test
          docker rm star-sanctuary-test

      - name: Build multi-platform images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BELLDANDY_VERSION=${{ steps.build_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Job 2: 发布到 Docker Hub（仅 main 分支和 tags）
  # ========================================
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build version
        id: build_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./package.json').version || '0.0.0-dev'")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BELLDANDY_VERSION=${{ steps.build_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Star Sanctuary - Local-first Personal AI Assistant"
          readme-filepath: ./DOCKER_HUB_README.md

  # ========================================
  # Job 3: 创建 GitHub Release（仅 tags）
  # ========================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build workspace
        run: pnpm build

      - name: Build release-light assets
        run: pnpm build:release-light

      - name: Verify release-light assets
        run: pnpm verify:release-light

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ ! -f CHANGELOG.md ]]; then
            {
              echo "body<<EOF"
              echo "No changelog entry found for v${VERSION}."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SECTION="$(awk -v ver="$VERSION" '
            BEGIN { capture=0 }
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)"

          if [[ -z "${SECTION//[[:space:]]/}" ]]; then
            SECTION="No changelog entry found for v${VERSION}."
          fi

          {
            echo "body<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Star Sanctuary v${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.body }}

            ## Docker Images

            ```bash
            # Pull latest image
            docker pull vrboyzero/star-sanctuary:${{ steps.version.outputs.VERSION }}
            docker pull vrboyzero/star-sanctuary:latest

            # Run with Docker Compose
            docker compose up -d
            ```

            ## Documentation

            - [Docker Deployment Guide](https://github.com/${{ github.repository }}/blob/main/DOCKER_DEPLOYMENT.md)
            - [Tailscale Remote Access](https://github.com/${{ github.repository }}/blob/main/docs/TAILSCALE_DEPLOYMENT.md)
            
            ## Release Assets

            This release includes lightweight official assets for GitHub download and future package-manager integration.
          draft: false
          prerelease: false
          files: |
            artifacts/release-light/v${{ steps.version.outputs.VERSION }}/star-sanctuary-dist-v${{ steps.version.outputs.VERSION }}.zip
            artifacts/release-light/v${{ steps.version.outputs.VERSION }}/star-sanctuary-dist-v${{ steps.version.outputs.VERSION }}.tar.gz
            artifacts/release-light/v${{ steps.version.outputs.VERSION }}/star-sanctuary-dist-v${{ steps.version.outputs.VERSION }}.manifest.json
            artifacts/release-light/v${{ steps.version.outputs.VERSION }}/star-sanctuary-dist-v${{ steps.version.outputs.VERSION }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========================================
  # Job 4: 准备 Windows portable / winget 预备产物（仅 tags）
  # ========================================
  release-windows-assets:
    name: Prepare Windows Packaging Assets
    runs-on: windows-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_WINDOWS_PACKAGING == 'true'
    permissions:
      contents: read
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Map short workspace path
        shell: pwsh
        run: |
          subst R: $env:GITHUB_WORKSPACE
          "SHORT_WORKSPACE=R:/" >> $env:GITHUB_ENV

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ env.SHORT_WORKSPACE }}
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        working-directory: ${{ env.SHORT_WORKSPACE }}
        shell: pwsh
        run: |
          "VERSION=$($env:GITHUB_REF -replace '^refs/tags/v', '')" >> $env:GITHUB_OUTPUT

      - name: Build workspace
        working-directory: ${{ env.SHORT_WORKSPACE }}
        run: pnpm build

      - name: Build Windows portable asset
        working-directory: ${{ env.SHORT_WORKSPACE }}
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "build-portable.log"
          if (Test-Path $logPath) { Remove-Item $logPath -Force }
          pnpm build:portable *>&1 | Tee-Object -FilePath $logPath
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content $logPath -Tail 80) -join "`n"
            Write-Host "::error::Portable build failed. Tail:`n$tail"
            exit $LASTEXITCODE
          }

      - name: Smoke Windows portable asset
        working-directory: ${{ env.SHORT_WORKSPACE }}
        run: pnpm smoke:portable

      - name: Build winget assets
        working-directory: ${{ env.SHORT_WORKSPACE }}
        run: pnpm build:winget -- --version=${{ steps.version.outputs.VERSION }}

      - name: Verify winget assets
        working-directory: ${{ env.SHORT_WORKSPACE }}
        run: pnpm verify:winget -- --version=${{ steps.version.outputs.VERSION }}

      - name: Upload winget preparation artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-prep-v${{ steps.version.outputs.VERSION }}
          path: |
            ${{ env.SHORT_WORKSPACE }}/artifacts/winget/v${{ steps.version.outputs.VERSION }}/manifests/**
            ${{ env.SHORT_WORKSPACE }}/artifacts/winget/v${{ steps.version.outputs.VERSION }}/*.metadata.json
            ${{ env.SHORT_WORKSPACE }}/artifacts/winget/v${{ steps.version.outputs.VERSION }}/*.sha256
          if-no-files-found: error
          retention-days: 30
