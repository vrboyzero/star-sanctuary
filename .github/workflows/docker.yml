name: Docker Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: belldandy/belldandy

jobs:
  # ========================================
  # Job 1: 构建和测试
  # ========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: belldandy:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # 启动容器（使用 mock agent，无需 API key）
          docker run -d \
            --name belldandy-test \
            -e BELLDANDY_HOST=127.0.0.1 \
            -e BELLDANDY_PORT=28889 \
            -e BELLDANDY_AUTH_MODE=none \
            -e BELLDANDY_AGENT_PROVIDER=mock \
            -e BELLDANDY_TOOLS_ENABLED=false \
            -p 28889:28889 \
            belldandy:test

          # 等待健康检查通过（最多 60 秒）
          echo "Waiting for health check..."
          for i in {1..30}; do
            if docker exec belldandy-test node -e "require('http').get('http://127.0.0.1:28889/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" 2>/dev/null; then
              echo "✅ Health check passed"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Health check failed after 60s"
              docker logs belldandy-test
              exit 1
            fi
            sleep 2
          done

          # 测试 WebChat 静态文件
          echo "Testing WebChat static files..."
          curl -f http://localhost:28889/ || (echo "❌ WebChat index.html not found" && exit 1)
          echo "✅ WebChat accessible"

          # 清理
          docker stop belldandy-test
          docker rm belldandy-test

      - name: Build multi-platform images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Job 2: 发布到 Docker Hub（仅 main 分支和 tags）
  # ========================================
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Belldandy - Local-first Personal AI Assistant"
          readme-filepath: ./docs/DOCKER_HUB_README.md

  # ========================================
  # Job 3: 创建 GitHub Release（仅 tags）
  # ========================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## Docker Images

            ```bash
            # Pull latest image
            docker pull belldandy/belldandy:${{ steps.version.outputs.VERSION }}
            docker pull belldandy/belldandy:latest

            # Run with docker-compose
            docker-compose up -d
            ```

            ## What's Changed

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Documentation

            - [Docker Deployment Guide](https://github.com/${{ github.repository }}/blob/main/docs/DOCKER_DEPLOYMENT.md)
            - [Tailscale Remote Access](https://github.com/${{ github.repository }}/blob/main/docs/TAILSCALE_DEPLOYMENT.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
