name: star-sanctuary

# 对外发布名已切换为 Star Sanctuary。
# 为兼容现有脚本、CLI 说明和运维命令，service key / container_name 继续保留 belldandy-*。
services:
  # Star Sanctuary Gateway
  belldandy-gateway:
    image: ${BELLDANDY_IMAGE:-vrboyzero/star-sanctuary:local}
    container_name: belldandy-gateway
    init: true
    restart: unless-stopped

    environment:
      HOME: /home/belldandy
      TERM: xterm-256color

      # 网络配置（LAN 访问需显式设置）
      BELLDANDY_HOST: ${BELLDANDY_HOST:-127.0.0.1}
      BELLDANDY_PORT: 28889

      # 认证配置（强制要求）
      BELLDANDY_AUTH_MODE: ${BELLDANDY_AUTH_MODE:-token}
      BELLDANDY_AUTH_TOKEN: ${BELLDANDY_AUTH_TOKEN}

      # Agent 配置
      BELLDANDY_AGENT_PROVIDER: ${BELLDANDY_AGENT_PROVIDER:-openai}
      BELLDANDY_OPENAI_BASE_URL: ${BELLDANDY_OPENAI_BASE_URL}
      BELLDANDY_OPENAI_API_KEY: ${BELLDANDY_OPENAI_API_KEY}
      BELLDANDY_OPENAI_MODEL: ${BELLDANDY_OPENAI_MODEL}

      # 功能开关
      BELLDANDY_TOOLS_ENABLED: ${BELLDANDY_TOOLS_ENABLED:-true}
      BELLDANDY_MEMORY_ENABLED: ${BELLDANDY_MEMORY_ENABLED:-true}
      BELLDANDY_EMBEDDING_ENABLED: ${BELLDANDY_EMBEDDING_ENABLED:-false}
      BELLDANDY_EMBEDDING_MODEL: ${BELLDANDY_EMBEDDING_MODEL:-}

      # 日志配置
      BELLDANDY_LOG_LEVEL: ${BELLDANDY_LOG_LEVEL:-info}
      BELLDANDY_LOG_CONSOLE: ${BELLDANDY_LOG_CONSOLE:-true}
      BELLDANDY_LOG_FILE: ${BELLDANDY_LOG_FILE:-true}

      # 其他配置
      BELLDANDY_WEB_ROOT: /app/apps/web/public
      BELLDANDY_STATE_DIR: /home/belldandy/.star_sanctuary

    volumes:
      # 配置 + 状态持久化
      - "${BELLDANDY_STATE_DIR:-~/.star_sanctuary}:/home/belldandy/.star_sanctuary"
      # 工作区（可选，用于文件工具）
      - "${BELLDANDY_WORKSPACE_DIR:-./workspace}:/home/belldandy/workspace"

    ports:
      - "${BELLDANDY_GATEWAY_PORT:-28889}:28889"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:28889/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Star Sanctuary CLI（管理工具）
  belldandy-cli:
    image: ${BELLDANDY_IMAGE:-vrboyzero/star-sanctuary:local}
    container_name: belldandy-cli
    init: true
    stdin_open: true
    tty: true

    environment:
      HOME: /home/belldandy
      TERM: xterm-256color
      BELLDANDY_AUTH_TOKEN: ${BELLDANDY_AUTH_TOKEN}

    volumes:
      - "${BELLDANDY_STATE_DIR:-~/.star_sanctuary}:/home/belldandy/.star_sanctuary"
      - "${BELLDANDY_WORKSPACE_DIR:-./workspace}:/home/belldandy/workspace"

    entrypoint: ["pnpm", "bdd"]
    profiles: ["cli"]

  # Tailscale Sidecar（远程访问）
  tailscale:
    image: tailscale/tailscale:latest
    container_name: belldandy-tailscale
    hostname: belldandy-gateway
    init: true
    restart: unless-stopped

    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTH_KEY}
      TS_EXTRA_ARGS: ${TAILSCALE_EXTRA_ARGS:---ssh}
      TS_STATE_DIR: /var/lib/tailscale

    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    profiles: ["tailscale"]

  # Star Sanctuary Gateway with Tailscale（通过 Tailscale 网络访问）
  belldandy-gateway-tailscale:
    image: ${BELLDANDY_IMAGE:-vrboyzero/star-sanctuary:local}
    container_name: belldandy-gateway-tailscale
    init: true
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      - tailscale

    environment:
      HOME: /home/belldandy
      TERM: xterm-256color

      # 监听所有接口（Tailscale 网络）
      BELLDANDY_HOST: 0.0.0.0
      BELLDANDY_PORT: 28889

      # 认证配置（强制要求）
      BELLDANDY_AUTH_MODE: ${BELLDANDY_AUTH_MODE:-token}
      BELLDANDY_AUTH_TOKEN: ${BELLDANDY_AUTH_TOKEN}

      # Agent 配置
      BELLDANDY_AGENT_PROVIDER: ${BELLDANDY_AGENT_PROVIDER:-openai}
      BELLDANDY_OPENAI_BASE_URL: ${BELLDANDY_OPENAI_BASE_URL}
      BELLDANDY_OPENAI_API_KEY: ${BELLDANDY_OPENAI_API_KEY}
      BELLDANDY_OPENAI_MODEL: ${BELLDANDY_OPENAI_MODEL}

      # 功能开关
      BELLDANDY_TOOLS_ENABLED: ${BELLDANDY_TOOLS_ENABLED:-true}
      BELLDANDY_MEMORY_ENABLED: ${BELLDANDY_MEMORY_ENABLED:-true}
      BELLDANDY_EMBEDDING_ENABLED: ${BELLDANDY_EMBEDDING_ENABLED:-false}
      BELLDANDY_EMBEDDING_MODEL: ${BELLDANDY_EMBEDDING_MODEL:-}

      # 日志配置
      BELLDANDY_LOG_LEVEL: ${BELLDANDY_LOG_LEVEL:-info}
      BELLDANDY_LOG_CONSOLE: ${BELLDANDY_LOG_CONSOLE:-true}
      BELLDANDY_LOG_FILE: ${BELLDANDY_LOG_FILE:-true}

      # 其他配置
      BELLDANDY_WEB_ROOT: /app/apps/web/public
      BELLDANDY_STATE_DIR: /home/belldandy/.star_sanctuary

    volumes:
      - "${BELLDANDY_STATE_DIR:-~/.star_sanctuary}:/home/belldandy/.star_sanctuary"
      - "${BELLDANDY_WORKSPACE_DIR:-./workspace}:/home/belldandy/workspace"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:28889/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    profiles: ["tailscale"]

volumes:
  tailscale-state:
