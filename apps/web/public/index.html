<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belldandy WebChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=10.0" />
  <link rel="stylesheet" href="/canvas.css?v=1.0" />
  <script src="/config.js?v=1.0"></script>
</head>

<body>
  <main class="layout">
    <header class="header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="title">Belldandy WebChat</div>
        <a id="officialHomeLink" href="#" target="_blank"
          style="font-size: 15px; text-decoration: underline; color: #d4a017; transition: color 0.2s;"
          onmouseover="this.style.color='#f0c040'" onmouseout="this.style.color='#d4a017'">官方主页</a>
      </div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <div class="token-usage" id="tokenUsage" title="Token Usage">
          <span class="token-label">SYS</span><span class="token-val" id="tuSys">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">CTX</span><span class="token-val" id="tuCtx">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">IN</span><span class="token-val" id="tuIn">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">OUT</span><span class="token-val" id="tuOut">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">ALL</span><span class="token-val token-val-all" id="tuAll">--</span>
        </div>
        <div class="task-token-usage" id="taskTokenUsage" title="Task Token Usage" style="display: none;">
          <span class="token-label">TASK</span><span class="token-val" id="taskName">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">IN</span><span class="token-val" id="taskIn">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">OUT</span><span class="token-val" id="taskOut">--</span>
          <span class="token-sep">|</span>
          <span class="token-label">TOTAL</span><span class="token-val token-val-all" id="taskTotal">--</span>
        </div>
        <div class="status" id="status">disconnected</div>
        <button id="openToolSettings" class="settings-btn" title="调用设置">&#x1F527;</button>
        <button id="openSettings" class="settings-btn" title="Settings">&#x2699;&#xFE0F;</button>
      </div>
    </header>

    <section class="panel">
      <!-- 输入行 -->
      <div class="row panel-input-row">
        <!-- 可操作区输入 + 保存按钮 -->
        <div class="panel-input-group workspace-input-group">
          <div class="input-label-row">
            <span class="panel-label">可操作区<span class="panel-hint">：额外允许读写的盘符与目录</span></span>
          </div>
          <div class="input-with-btn">
            <input id="workspaceRoots" class="input input-sm" placeholder="E:/,D:/Game"
              title="额外允许 Agent 读写的根目录，逗号分隔" />
            <button id="saveWorkspaceRoots" class="save-link" title="保存到 .env"><u>保存</u></button>
          </div>
        </div>
        <!-- Auth 选择 -->
        <div class="panel-input-group auth-input-group">
          <div class="input-label-row">
            <span class="panel-label">Auth</span>
          </div>
          <div class="auth-controls">
            <select id="authMode" class="select select-sm">
              <option value="none">none</option>
              <option value="token">token</option>
              <option value="password">password</option>
            </select>
            <input id="authValue" class="input input-sm" placeholder="token / password" />
          </div>
        </div>
        <!-- UUID 输入 -->
        <div class="panel-input-group uuid-input-group">
          <div class="input-label-row">
            <span class="panel-label">UUID<span class="panel-hint">：用户身份标识（可选）</span></span>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input id="userUuid" class="input input-sm" placeholder="输入你的UUID（可选）" title="用于身份权力验证，如SOUL.md中定义的主人UUID匹配"
              style="flex: 1;" />
            <button id="saveUuid" class="button" style="padding: 6px 12px; font-size: 12px;">保存</button>
          </div>
        </div>
        <button id="connect" class="button">Connect</button>
      </div>
    </section>

    <div class="main-content">
      <!-- 左侧边栏：智能体设置 -->
      <aside class="sidebar" id="sidebar">
        <!-- 导航区域 -->
        <div style="padding: 12px 16px 0; display: flex; flex-direction: column; gap: 8px;">
          <button id="switchRoot" class="sidebar-action-btn"
            style="text-align: left; font-weight: 600; background: rgba(255,255,255,0.1); justify-content: flex-start;">📂
            智能体设置</button>
          <button id="switchFacet" class="sidebar-action-btn"
            style="text-align: left; opacity: 0.7; justify-content: flex-start;">🧩 模组编辑</button>
          <button id="switchCanvas" class="sidebar-action-btn"
            style="text-align: left; opacity: 0.7; justify-content: flex-start;">🎨 画布工作区</button>
        </div>

        <!-- 树头部 -->
        <div class="sidebar-header"
          style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);">
          <span class="sidebar-title" id="treeTitle" style="font-size: 0.85em; opacity: 0.5;">文件列表</span>
          <div style="display: flex; gap: 4px;">
            <!-- 配置按钮移到这里 -->
            <button id="openEnvEditor" class="sidebar-btn" title="编辑 .env 配置">⚙</button>
            <button id="refreshTree" class="sidebar-btn" title="刷新">⟳</button>
          </div>
        </div>

        <div class="file-tree" id="fileTree">
          <div class="tree-loading">加载中...</div>
        </div>
      </aside>

      <!-- 主区域 -->
      <div class="main-area">
        <!-- 聊天模式：消息列表 -->
        <section class="chat" id="chatSection">
          <div class="messages" id="messages"></div>
        </section>

        <!-- 编辑模式：文件编辑器 -->
        <section class="editor-section hidden" id="editorSection">
          <div class="editor-header">
            <span class="editor-path" id="editorPath">文件路径</span>
          </div>
          <textarea class="editor-textarea" id="editorTextarea" spellcheck="false"></textarea>
        </section>

        <!-- 画布模式：Canvas 可视化工作区 -->
        <section class="canvas-section hidden" id="canvasSection">
          <!-- 画布工具栏 -->
          <div class="canvas-toolbar" id="canvasToolbar">
            <div class="canvas-toolbar-left">
              <span class="canvas-board-name" id="canvasBoardName">未命名画布</span>
            </div>
            <div class="canvas-toolbar-center">
              <button class="canvas-tb-btn" id="canvasAddTask" title="添加任务">+ 任务</button>
              <button class="canvas-tb-btn" id="canvasAddNote" title="添加笔记">+ 笔记</button>
              <button class="canvas-tb-btn" id="canvasAddMethod" title="添加方法论">+ 方法</button>
              <span class="canvas-tb-sep"></span>
              <button class="canvas-tb-btn" id="canvasAutoLayout" title="自动布局">布局</button>
              <button class="canvas-tb-btn" id="canvasFitView" title="适应视图">适应</button>
              <span class="canvas-tb-sep"></span>
              <button class="canvas-tb-btn canvas-tb-analyze" id="canvasAnalyze" title="让 Agent 分析当前画布">分析画布</button>
              <button class="canvas-tb-btn canvas-tb-react" id="canvasReactToggle" title="ReAct 可视化开关">ReAct</button>
            </div>
            <div class="canvas-toolbar-right">
              <span class="canvas-zoom-label" id="canvasZoomLabel">100%</span>
              <button class="canvas-tb-btn" id="canvasZoomIn" title="放大">+</button>
              <button class="canvas-tb-btn" id="canvasZoomOut" title="缩小">−</button>
              <span class="canvas-tb-sep"></span>
              <button class="canvas-tb-btn" id="canvasSave" title="保存">保存</button>
              <button class="canvas-tb-btn canvas-tb-close" id="canvasClose" title="返回聊天">✕</button>
            </div>
          </div>
          <!-- SVG 画布 -->
          <svg id="canvasSvg" class="canvas-svg" width="100%" height="100%">
            <defs>
              <marker id="cv-arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="var(--primary)" opacity="0.6" />
              </marker>
              <pattern id="cv-grid" width="24" height="24" patternUnits="userSpaceOnUse">
                <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" />
              </pattern>
            </defs>
            <g id="canvasViewport">
              <rect id="canvasGridBg" width="10000" height="10000" x="-5000" y="-5000" fill="url(#cv-grid)" />
              <g id="canvasEdgesLayer"></g>
              <g id="canvasNodesLayer"></g>
            </g>
          </svg>
          <!-- 连线拖拽临时层 -->
          <svg id="canvasTempSvg" class="canvas-temp-svg" width="100%" height="100%"></svg>
        </section>
      </div>
    </div>

    <!-- 聊天模式：输入框 -->
    <section class="composer" id="composerSection">
      <!-- 附件预览区 -->
      <div class="attachments-preview" id="attachmentsPreview"></div>
      <!-- 输入区 -->
      <div class="composer-input-row">
        <button id="attachBtn" class="attach-btn" title="添加附件">+</button>
        <button id="voiceBtn" class="voice-btn" title="语音输入 (长按或点击录音)">🎤</button>
        <span id="voiceDuration" class="voice-duration hidden">00:00</span>
        <input type="file" id="fileInput" class="hidden" multiple
          accept=".jpg,.jpeg,.png,.gif,.webp,.txt,.md,.json,.log,.mp4,.mov,.avi,.webm,.mkv" />
        <textarea id="prompt" class="input" placeholder="输入消息… (可拖拽文件到此)" rows="1"></textarea>
        <select id="agentSelect" class="agent-select hidden" title="选择 Agent"></select>
        <button id="send" class="button" disabled>Send</button>
      </div>
    </section>

    <!-- 编辑模式：操作按钮 -->
    <section class="editor-actions hidden" id="editorActions">
      <button id="cancelEdit" class="button editor-cancel">取消</button>
      <button id="saveEdit" class="button editor-save">保存</button>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header" style="display: flex; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
          <span>Settings</span>
          <a id="recommendApiLink" href="#" target="_blank"
            style="font-size: 14px; text-decoration: underline; color: #a3a3a3; transition: color 0.2s;"
            onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a3a3a3'">推荐模型API</a>
        </div>
        <button id="closeSettings" class="settings-btn">✕</button>
      </div>
      <div class="modal-body">
        <!-- Doctor Status -->
        <div class="form-group">
          <label class="form-label">System Doctor</label>
          <div id="doctorStatus" style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span class="badge">Checking...</span>
          </div>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #eee;">

        <!-- Config Fields -->
        <div class="form-group">
          <label class="form-label">OpenAI API Key</label>
          <input id="cfgApiKey" class="input" type="password" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label class="form-label">OpenAI Base URL</label>
          <input id="cfgBaseUrl" class="input" placeholder="https://api.openai.com/v1" />
        </div>
        <div class="form-group">
          <label class="form-label">OpenAI Model</label>
          <input id="cfgModel" class="input" placeholder="gpt-4o" />
        </div>
        <div class="form-group">
          <label class="form-label">Heartbeat Interval</label>
          <input id="cfgHeartbeat" class="input" placeholder="30m" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="restartBtn" class="button" style="color: #666;">Restart Server</button>
        <button id="saveSettings" class="button" style="background: #333; color: white;">Save</button>
      </div>
    </div>
  </div>

  <!-- Tool Settings Modal (调用设置) -->
  <div id="toolSettingsModal" class="modal-overlay hidden">
    <div class="modal tool-settings-modal">
      <div class="modal-header" style="display: flex; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
          <span>调用设置</span>
          <a id="workshopLink" href="#" target="_blank"
            style="font-size: 15px; text-decoration: underline; color: #d4a017; transition: color 0.2s;"
            onmouseover="this.style.color='#f0c040'" onmouseout="this.style.color='#d4a017'">工坊入口</a>
        </div>
        <button id="closeToolSettings" class="settings-btn">✕</button>
      </div>
      <div class="tool-settings-tabs">
        <button class="tool-tab active" data-tab="builtin">工具</button>
        <button class="tool-tab" data-tab="mcp">MCP</button>
        <button class="tool-tab" data-tab="plugins">插件</button>
        <button class="tool-tab" data-tab="skills">技能</button>
      </div>
      <div class="modal-body" id="toolSettingsBody">
        <div class="tool-settings-empty">连接后可查看工具列表</div>
      </div>
      <div class="modal-footer">
        <button id="saveToolSettings" class="button" style="background: var(--text-main); color: #000;">保存</button>
      </div>
    </div>
  </div>

  <!-- Awakening Overlay -->
  <div id="awakening" class="awakening-overlay hidden">
    <div class="scanline"></div>
    <div class="terminal-container">
      <div id="bootLog" class="boot-log"></div>
    </div>
  </div>

  <!-- Restart Countdown Overlay -->
  <div id="restartOverlay" class="restart-overlay hidden">
    <div class="restart-content">
      <div class="restart-icon">⟳</div>
      <div class="restart-title">Service Restarting</div>
      <div id="restartReason" class="restart-reason"></div>
      <div id="restartCountdown" class="restart-countdown">3</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script type="module" src="/canvas.js?v=1.0"></script>
  <script type="module" src="/app.js"></script>
</body>

</html>
